server {
    listen 80;
    listen [::]:80;
    server_name lira-indonesia.org www.lira-indonesia.org;

    # Redirect all HTTP traffic to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lira-indonesia.org www.lira-indonesia.org;

    # Cloudflare Origin Certificate files.
    ssl_certificate /etc/ssl/cloudflare/lira-indonesia.org.crt;
    ssl_certificate_key /etc/ssl/cloudflare/lira-indonesia.org.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Limit upload size to matching the Web API (10MB payload)
    client_max_body_size 10M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Next.js Frontend Reverse Proxy Server
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Golang Backend API Reverse Proxy Server
    location /api/ {
        proxy_pass http://localhost:8080/api/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
    }

    # API Uploads Directory Reverse Proxy
    location /uploads/ {
        # Ensure uploaded scripts are not executable by browser sniffing.
        add_header X-Content-Type-Options nosniff;

        alias /var/www/html/lira/backend/uploads/;
        # You can use proxy_pass to backend if you want Go-managed headers.
        # proxy_pass http://localhost:8080/uploads/;
    }

    # GZIP compression for static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
